{% extends 'base.html' %}
{% block content %}
  <h1>Ideal Intake</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Idea ID (optional)</label>
      <input name="idea_id" class="form-control" placeholder="Leave empty to generate">
    </div>
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input name="title" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="4"></textarea>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Owner</label>
        <input name="owner" class="form-control">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Estimated Benefit</label>
        <input name="estimated_benefit" class="form-control">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Data Maturity (1-5)</label>
        <select name="data_maturity" class="form-select">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Dependencies Count</label>
        <input name="dependencies_count" type="number" class="form-control" min="0" value="1">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Workflow Overlap (0-3)</label>
        <input name="workflow_overlap" type="number" class="form-control" min="0" max="3" value="0">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Strategic Fit (1-5)</label>
        <input name="strategic_fit" type="number" class="form-control" min="1" max="5" value="3">
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Trend Score (1-5)</label>
        <input name="trend_score" type="number" class="form-control" min="1" max="5" value="3">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Competitor Signal (1-5)</label>
        <input name="competitor_signal" type="number" class="form-control" min="1" max="5" value="3">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Market Risk (1-5)</label>
        <input name="market_risk" type="number" class="form-control" min="1" max="5" value="3">
      </div>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" value="1" name="contains_sensitive_concepts" id="containsSensitiveConcepts">
      <label class="form-check-label" for="containsSensitiveConcepts">
        Contains sensitive/proprietary information
      </label>
    </div>
    <button class="btn btn-primary">Submit Intake</button>
  </form>
{% endblock %}
